{% extends 'accounts/base.html' %}
{% block content %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Additional Styling */
        body {
            /* Set background image */
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQpLn5reWRgbF_8Et4qBAtE60bLmFcvwAElMw&s');
            /* Change the URL as needed */
            background-size: cover;
            background-repeat: no-repeat;
            padding-top: 50px;
        }

        /* Glass Effect for the card */
        .card-custom {
            backdrop-filter: blur(10px);
            /* Blur effect for glass effect */
            background-color: rgba(255, 255, 255, 0.3);
            /* Translucent background */
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1), 0 8px 16px rgba(0, 0, 0, 0.1), 0 12px 24px rgba(0, 123, 255, 0.3);
            transition: box-shadow 0.3s ease-in-out;
        }

        .card-custom:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2), 0 12px 24px rgba(0, 0, 0, 0.2), 0 16px 32px rgba(0, 123, 255, 0.5);
        }

        .form-label {
            font-weight: bold;
            color: white;
            /* Text color change for readability */
        }

        .card-title {
            color: white;
        }

        .form-control {
            background-color: rgba(255, 255, 255, 0.7);
            /* Translucent input background */
            border: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <!-- Card with Glass and Shadow Effect -->
                <div class="card card-custom mt-5 p-4">
                    <div class="card-body">
                        <h3 class="card-title text-center">Admin Login</h3>

                        <!-- Login Form -->
                        <form action="#" method="post" novalidate>
                            {% csrf_token %}
                            <!-- Username -->
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                                <div class="invalid-feedback">
                                    Please choose a username.
                                </div>
                            </div>

                            <!-- Password -->
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                                <div class="invalid-feedback">
                                    Please enter your password.
                                </div>
                            </div>

                            <!-- Submit Button -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Login</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS for form validation and effects -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Bootstrap validation script
        (function () {
            'use strict'
            var forms = document.querySelectorAll('form')

            Array.prototype.slice.call(forms)
                .forEach(function (form) {
                    form.addEventListener('submit', function (event) {
                        if (!form.checkValidity()) {
                            event.preventDefault()
                            event.stopPropagation()
                        }
                        form.classList.add('was-validated')
                    }, false)
                })
        })()
    </script>

</body>
{% endblock %}
